# Example configuration for Solana Private Channels Operator
# Copy this file and customize for your deployment
# Secrets (DATABASE_URL, private keys) must be set via environment variables

[common]
# Program type: "escrow" or "withdraw"
program_type = "escrow"

# RPC endpoint URL for transaction submission
rpc_url = "http://localhost:8899"

# Escrow instance ID (required for escrow program type, omit for withdraw)
# escrow_instance_id = "YourPubkeyHere..."

[storage]
# Storage type: "postgres"
type = "postgres"

# Maximum number of database connections
max_connections = 10

# Database URL must be set via environment variable: DATABASE_URL
# The indexer DB is loopback/internal-only and listens on port 5434.
# Example: export DATABASE_URL="postgresql://user:pass@localhost:5434/indexer"

[operator]
# Database polling interval in seconds
poll_interval_secs = 5

# Number of transactions to fetch per batch
batch_size = 10

# Maximum retry attempts for failed transactions
retry_max_attempts = 3

# Retry base delay in seconds (exponential backoff applies)
retry_base_delay_secs = 1

# Channel buffer size for internal queues
channel_buffer_size = 100

# === Signer Configuration (via Environment Variables) ===
#
# Required for all operators:
#   ADMIN_SIGNER=memory|vault|turnkey|privy
#   ADMIN_PRIVATE_KEY=<key-or-identifier>
#
# Optional (falls back to admin if not set):
#   OPERATOR_SIGNER=memory|vault|turnkey|privy
#   OPERATOR_PRIVATE_KEY=<key-or-identifier>
#
# Type-specific variables (required based on signer type):
#
# Vault signers:
#   ADMIN_VAULT_ADDR, ADMIN_VAULT_TOKEN, ADMIN_PUBKEY
#   OPERATOR_VAULT_ADDR, OPERATOR_VAULT_TOKEN, OPERATOR_PUBKEY
#
# Turnkey signers:
#   ADMIN_TURNKEY_API_PUBLIC_KEY, ADMIN_TURNKEY_API_PRIVATE_KEY,
#   ADMIN_TURNKEY_ORGANIZATION_ID, ADMIN_PUBKEY
#   OPERATOR_TURNKEY_* (same pattern)
#
# Privy signers:
#   ADMIN_PRIVY_APP_ID, ADMIN_PRIVY_APP_SECRET, ADMIN_PRIVY_WALLET_ID
#   OPERATOR_PRIVY_* (same pattern)

# Reconciliation settings (part of [operator])
# How often to run escrow balance reconciliation checks (in seconds)
# Default: 300 seconds (5 minutes)
reconciliation_interval_secs = 300

# Tolerance threshold in basis points (100 bps = 1%)
#
# Basis points (bps) are a unit of measurement equal to 1/100th of a percent.
# Examples:
#   - 10 bps = 0.1% tolerance
#   - 100 bps = 1.0% tolerance
#   - 1 bps = 0.01% tolerance
#
# The delta is calculated as: |(on_chain_balance - db_balance) / on_chain_balance * 10000|
#
# Example scenario:
#   - On-chain balance: 1,000,000 tokens
#   - DB balance:       999,500 tokens
#   - Delta: |1,000,000 - 999,500| / 1,000,000 * 10000 = 50 bps (0.5%)
#   - If tolerance_bps = 10, this would trigger an alert (50 > 10)
#   - If tolerance_bps = 100, this would be within tolerance (50 < 100)
#
# Tolerance accounts for in-flight transactions and minor timing differences.
# Set lower for stricter monitoring, higher if you expect more transaction latency.
#
# Default: 10 bps (0.1%)
reconciliation_tolerance_bps = 10

# Webhook URL for reconciliation alerts (optional)
# POST requests will be sent to this URL when balance mismatches exceed the tolerance threshold
#
# Webhook Payload Format (JSON):
# {
#   "mint": "TokenMintPubkey...",           // The SPL token mint address (e.g., USDC, SOL)
#   "on_chain_balance": 1000000,            // Actual balance in the escrow's ATA on-chain (u64)
#   "db_balance": 999500,                   // Expected balance from database (sum of deposits - withdrawals) (i64)
#   "delta_bps": 50,                        // Calculated difference in basis points (u64)
#   "timestamp": "2026-02-25T12:34:56Z"     // ISO 8601 timestamp when the mismatch was detected
# }
#
# Webhooks are sent with:
# - HTTP Method: POST
# - Content-Type: application/json
# - Retry Logic: 3 attempts with exponential backoff (500ms base delay, capped at 5s)
# - Timeout: Standard reqwest defaults
#
# If webhook URL is not set, mismatches will only be logged (no HTTP requests sent).
#
# Uncomment and set to enable webhook alerts:
# reconciliation_webhook_url = "https://your-webhook-endpoint.com/alerts"

# Feepayer balance monitoring interval (seconds)
# Only applies to escrow operators (ReleaseFunds feepayer on Solana mainnet)
# Default: 60 seconds
feepayer_monitor_interval_secs = 60
