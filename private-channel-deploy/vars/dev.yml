# Loaded by deploy.yml when invoked with `-l dev`

# === What to deploy =========================================================

# image_registry — registry prefix for pulled images. Format: <registry>/<owner>,
# where <owner> is your GitHub username or org, lowercased (GHCR namespaces are
# case-sensitive and lowercase-only). Example: ghcr.io/huzaifa696.
# See README → "Using GHCR" for the full setup (PAT, build, push).
image_registry: ghcr.io/<owner>

# image_tag — the docker tag to pull. Bump per deploy.
image_tag: v0.1.0

# === Network the deployed stack talks to ===================================

# network — which Solana cluster the indexer + operator point at.
#   localnet : the validator container baked into docker-compose.yml (default for self-tests).
#   devnet   : Solana's public devnet (set rpc_url accordingly).
#   mainnet  : Solana mainnet (production only).
network: localnet

# rpc_url — full HTTP RPC endpoint matching `network`.
#   localnet : http://127.0.0.1:18899 (validator container, host-side port).
#   devnet   : https://api.devnet.solana.com (rate-limited; use a paid RPC for real work).
#   mainnet  : your dedicated RPC (Helius, Triton, QuickNode, etc.).
rpc_url: http://127.0.0.1:18899

# yellowstone_endpoint — Yellowstone gRPC endpoint for indexer-solana real-time
# streaming. Env-specific, so it lives here rather than in common.yml.
#   localnet : ignored — docker-compose.yml hardcodes http://validator:10000, so "" is fine.
#   devnet / mainnet : your provider's URL (Helius/Triton/QuickNode). Preflight
#                      asserts non-empty when network != localnet; pair with
#                      yellowstone_token in secrets.yml.
yellowstone_endpoint: ""

# === On-host layout ========================================================

# host_data_dir — where Compose volumes, rendered config, and logs live on the host.
#   /tmp/private-channel-test : self-tests; doesn't need root, gets wiped on host reboot.
#   /opt/private-channel      : real deploys (default in common.yml). Survives reboots.
host_data_dir: /tmp/private-channel-test

# === Gateway auth & port ===================================================

# gateway_enforce_jwt — whether the gateway requires a signed JWT on every RPC call.
#   false : operator services can call getSignaturesForAddress without auth (required for the dev self-test).
#   true  : production setting. When enabling, also set `jwt_secret` in secrets.yml
#           (already required there; the gateway will refuse to start without it).
gateway_enforce_jwt: false

# gateway_port — host-side port the gateway listens on. Default 8899 in vars/common.yml.
# Override here if 8899 collides on this host (e.g. local Solana test-validator).
# gateway_port: 8899

# === Program IDs ===========================================================
# Addresses the indexer/operator watch. On localnet these are also where the
# bundled validator deploys the repo's .so files (pinned to the repo keypairs).
# On devnet/mainnet the programs must already be deployed; set these to match.
escrow_program_id: GokvZqD2yP696rzNBNbQvcZ4VsLW7jNvFXU1kW9m7k83
withdraw_program_id: J231K9UEpS4y4KAPwGc4gsMNCjKFRMYcQBcjVW7vBhVi

# === Escrow instance =======================================================
# escrow_instance_id — the on-chain escrow instance the indexer/operator watch
# (rendered as ESCROW_INSTANCE_ID / COMMON_ESCROW_INSTANCE_ID in .env).
# Leave commented on localnet: the deploy's pipeline phase creates the instance
# and writes the real PDA back into .env (env.j2 falls back to the all-1s
# placeholder until then). On devnet/mainnet the instance already exists —
# uncomment and set it to the address you created (e.g. via the Admin UI), or
# the indexer will watch a placeholder address that nothing is deployed at.
# (Must stay commented when unset: Jinja2 `| default()` only fills an *undefined*
# var, so an active placeholder would render a non-base58 ESCROW_INSTANCE_ID and
# crash the indexer's Pubkey::from_str at boot.)
# escrow_instance_id: "<your_instance_address>"

# === Admin keypair ==========================================================
# Path on the control node to a funded Solana keypair (JSON byte array).
# Used to derive the operator services' ADMIN_PRIVATE_KEY at runtime, and by
# any post-deploy admin tooling that signs on-chain transactions.
admin_keypair_path: "{{ repo_root }}/keypairs/admin.json"

# === Public surface ========================================================

# domain — hostname the gateway is reachable at. Used by the report phase + any
# reverse-proxy template. `localhost` for self-tests; real DNS for prod.
domain: localhost

# === Reset-state binding ===================================================

# reset_state — when true, every deploy wipes the validator ledger AND the indexer
# Postgres volume in lockstep. Required for dev because the validator boots with
# `--reset` (fresh ATAs); leaving the indexer DB intact would trigger
# `MismatchExceedsThreshold` in startup reconciliation. Set to false in prod.
# Override at the CLI with `-e reset_state=false`.
reset_state: true

# === Monitoring ports (host-side) ==========================================
monitoring_dir: "{{ host_data_dir }}/monitoring"
monitoring_grafana_port: 3001
monitoring_prometheus_port: 9090
monitoring_blackbox_port: 9115
monitoring_cadvisor_port: 8081
monitoring_node_exporter_port: 9101
monitoring_postgres_exporter_port: 9187
# Indexer postgres-exporter needs a distinct host port from the primary
# exporter (9187) so both can be scraped without colliding.
monitoring_postgres_exporter_indexer_port: 9188
