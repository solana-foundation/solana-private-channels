---
# Solana Private Channels deploy. Phases run top-to-bottom. Skip individual phases with
# `--skip-tags <name>`; run only one with `--tags <name>`. Banner debug tasks
# are tagged `always` so the headers print even in --tags mode.
- name: Deploy Solana Private Channels
  hosts: all
  gather_facts: true
  # One host at a time. Override at the CLI when you add more hosts later.
  serial: "{{ rolling_batch | default(1) }}"
  vars_files:
  - vars/common.yml
  # Selects vars/<env>.yml from the host's inventory group (e.g. dev → vars/dev.yml). Override via -e env=<name>.
  - "vars/{{ env | default(group_names | difference(['all']) | first | default('dev')) }}.yml"

  pre_tasks:
  # Load plain-text secrets. File is gitignored (see .gitignore).
  - name: Load plain-text secrets
    ansible.builtin.include_vars:
      file: "{{ playbook_dir }}/secrets.yml"
    tags: [ always ]
    run_once: true
    delegate_to: localhost

  # Track total elapsed time for the report phase.
  - name: Capture deploy start time
    ansible.builtin.set_fact:
      deploy_start_ts: "{{ ansible_date_time.iso8601 }}"
      deploy_start_epoch: "{{ ansible_date_time.epoch }}"
    tags: [ always ]

  # Derive admin pubkey + base58 private key from the on-disk keypair so the
  # operator containers start with real signing creds. solana-keygen is the
  # source of truth for the pubkey; for the b58 private key we shell out to a
  # tiny inline Python (no extra deps). Both run on the control node.
  - name: Resolve admin pubkey + b58 private key
    when: admin_keypair_path is defined
    tags: [ always ]
    delegate_to: localhost
    run_once: true
    block:
    - name: Stat admin keypair file
      ansible.builtin.stat:
        path: "{{ admin_keypair_path }}"
      register: _admin_kp_stat

    # Track presence via a boolean fact so the inner auto-gen block can
    # update it without re-registering the stat result (a `register:` on a
    # skipped task would overwrite _admin_kp_stat with a skip dict that has
    # no `.stat` attribute, breaking the downstream assert).
    - name: Track admin keypair presence
      ansible.builtin.set_fact:
        _admin_kp_present: "{{ _admin_kp_stat.stat.exists }}"

    # On dev (network=localnet AND reset_state=true) the validator boots
    # fresh every deploy, so the admin pubkey is meaningful only for this
    # session — auto-generate one if missing. Gated on reset_state so we
    # never silently rotate an admin key that other state still references.
    # On any other env (devnet/mainnet/staging) the keypair is operator-
    # provided (HSM/KMS in prod) and a missing file is a hard fail.
    - name: Auto-generate admin keypair (localnet + reset_state only)
      when:
      - not _admin_kp_present
      - network == 'localnet'
      - reset_state | default(false) | bool
      block:
      - name: Ensure keypair parent dir exists
        ansible.builtin.file:
          path: "{{ admin_keypair_path | dirname }}"
          state: directory
          mode: "0700"
      - name: Generate fresh admin keypair via solana-keygen
        ansible.builtin.command: "solana-keygen new --no-bip39-passphrase --silent --outfile {{ admin_keypair_path }}"
      - name: Mark keypair as present after generation
        ansible.builtin.set_fact:
          _admin_kp_present: true

    # Without the keypair we'd silently fall through to env.j2's placeholder
    # ADMIN_PRIVATE_KEY/PRIVATE_CHANNEL_ADMIN_KEYS, the operators would start, then
    # panic at signer_util.rs:79 on `InvalidPrivateKey`. Surface the missing
    # file in preflight, with the exact command to fix it.
    - name: Assert admin keypair exists
      ansible.builtin.assert:
        that: _admin_kp_present
        fail_msg: |
          Admin keypair not found at {{ admin_keypair_path }}.
          Operator services need this to derive ADMIN_PRIVATE_KEY; without it
          they panic on startup with `InvalidPrivateKey`. The keypairs/ dir is
          gitignored so each operator generates their own.

          Auto-generation only runs for network=localnet with reset_state=true
          (current run: network={{ network }}, reset_state={{ reset_state | default(false) }}).

          Fix: solana-keygen new --no-bip39-passphrase --silent --outfile {{ admin_keypair_path }}

    - name: Derive admin pubkey via solana-keygen
      ansible.builtin.command: "solana-keygen pubkey {{ admin_keypair_path }}"
      changed_when: false
      register: _admin_pub

    # Inline base58 encoder — avoids requiring `pip install base58` on the
    # control node. Bitcoin alphabet, big-endian. Solana wallets accept the
    # 64-byte secret key (the full Vec<u8> from the JSON keypair) b58-encoded.
    - name: Derive admin b58 private key
      ansible.builtin.shell: |
        python3 - "{{ admin_keypair_path }}" <<'PY'
        import json, sys
        ALPHA = b'123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz'
        data = bytes(json.load(open(sys.argv[1])))
        n = int.from_bytes(data, 'big'); s = b''
        while n > 0:
            n, r = divmod(n, 58); s = ALPHA[r:r+1] + s
        pad = 0
        for x in data:
            if x == 0: pad += 1
            else: break
        print((b'1'*pad + s).decode())
        PY
      changed_when: false
      register: _admin_priv
      no_log: true

    - name: Set admin facts
      ansible.builtin.set_fact:
        admin_pubkey: "{{ _admin_pub.stdout | trim }}"
        admin_private_key: "{{ _admin_priv.stdout | trim }}"
        private_channel_admin_keys: "{{ _admin_pub.stdout | trim }}"
      no_log: true

  tasks:
  # =========================================================================
  # PHASE 1: PREFLIGHT — fail fast on missing tools/files/vars before touching the host.
  # =========================================================================
  - name: "==== PHASE 1: PREFLIGHT ===="
    ansible.builtin.debug:
      msg: "Verifying control-node + target tooling, files, and required variables."
    tags: [ always, preflight ]

  - name: Preflight checks
    tags: [ preflight ]
    block:
    # ---- Control node: ansible itself ----
    - name: Assert ansible >= 2.16 on control node
      ansible.builtin.assert:
        that:
        - ansible_version.full is version('2.16', '>=')
        fail_msg: |
          Ansible {{ ansible_version.full }} < 2.16 on control node. The playbook uses 2.16-era include_vars/assert features.
          Fix: pip install -U 'ansible-core>=2.16'  (or: pipx upgrade ansible)
      delegate_to: localhost
      run_once: true

    # ---- Control node: required Ansible collection ----
    - name: Probe community.general collection
      ansible.builtin.command: ansible-galaxy collection list community.general
      changed_when: false
      check_mode: false
      failed_when: false
      register: _coll_check
      delegate_to: localhost
      run_once: true

    - name: Assert community.general collection installed
      ansible.builtin.assert:
        that: _coll_check.rc == 0
        fail_msg: |
          Ansible collection 'community.general' not installed on control node. Several modules + callbacks the playbook uses live there.
          Fix: ansible-galaxy collection install community.general
      delegate_to: localhost
      run_once: true

    # ---- Control node: docker present + version ----
    - name: Read docker server version on control node
      ansible.builtin.command: docker version --format '{% raw %}{{.Server.Version}}{% endraw %}'
      changed_when: false
      check_mode: false
      failed_when: false
      register: _docker_v_local
      delegate_to: localhost
      run_once: true

    - name: Assert docker >= 26 on control node
      ansible.builtin.assert:
        that:
        - _docker_v_local.rc == 0
        - _docker_v_local.stdout is version('26', '>=')
        fail_msg: |
          Docker missing or < 26 on control node (got: {{ _docker_v_local.stdout | default('not found') }}). Playbook shells out to `docker compose` for build/pull/up.
          Fix: curl -fsSL https://get.docker.com | sh  (or see https://docs.docker.com/engine/install/)
      delegate_to: localhost
      run_once: true

    - name: Probe docker compose plugin on control node
      ansible.builtin.command: docker compose version
      changed_when: false
      check_mode: false
      failed_when: false
      register: _compose_local
      delegate_to: localhost
      run_once: true

    - name: Assert docker compose plugin on control node
      ansible.builtin.assert:
        that: _compose_local.rc == 0
        fail_msg: |
          Docker Compose plugin missing on control node. Deploy uses `docker compose up -d --wait` (v2 syntax).
          Fix: apt install docker-compose-plugin  (or see https://docs.docker.com/compose/install/)
      delegate_to: localhost
      run_once: true

    # ---- Target host: docker present + version ----
    - name: Read docker server version on target
      ansible.builtin.command: docker version --format '{% raw %}{{.Server.Version}}{% endraw %}'
      changed_when: false
      check_mode: false
      failed_when: false
      register: _docker_v_target

    - name: Assert docker >= 26 on target
      ansible.builtin.assert:
        that:
        - _docker_v_target.rc == 0
        - _docker_v_target.stdout is version('26', '>=')
        fail_msg: |
          Docker missing or < 26 on target host (got: {{ _docker_v_target.stdout | default('not found') }}). The Solana Private Channels stack runs as containers there.
          Fix on target: curl -fsSL https://get.docker.com | sh

    - name: Probe docker compose plugin on target
      ansible.builtin.command: docker compose version
      changed_when: false
      check_mode: false
      failed_when: false
      register: _compose_target

    - name: Assert docker compose plugin on target
      ansible.builtin.assert:
        that: _compose_target.rc == 0
        fail_msg: |
          Docker Compose plugin missing on target. Deploy phase runs `docker compose up -d --wait` to bring the stack up.
          Fix on target: apt install docker-compose-plugin

    # ---- Target host: host_data_dir parent exists ----
    - name: Stat host_data_dir parent
      ansible.builtin.stat:
        path: "{{ host_data_dir | dirname }}"
      register: _hdd_parent

    - name: Assert host_data_dir parent exists on target
      ansible.builtin.assert:
        that:
        - _hdd_parent.stat.exists
        - _hdd_parent.stat.isdir
        fail_msg: |
          Parent of host_data_dir ({{ host_data_dir | dirname }}) missing on target. Render writes compose.override.yml + .env there.
          Fix on target: sudo mkdir -p {{ host_data_dir | dirname }} && sudo chown "$USER" {{ host_data_dir | dirname }}

    # ---- Files the playbook reads ----
    - name: Stat required deployment files
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/{{ item }}"
      register: _file_stats
      loop:
      - secrets.yml
      - vars/common.yml
      - templates/compose.yml.j2
      - templates/env.j2
      delegate_to: localhost
      run_once: true

    - name: Assert required deployment files exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: |
          Required file `{{ item.item }}` missing in {{ playbook_dir }}. Playbook reads it during preflight/render.
          Fix: restore from git, or recreate per README §First run.
      loop: "{{ _file_stats.results }}"
      loop_control:
        label: "{{ item.item }}"
      delegate_to: localhost
      run_once: true

    # ---- Required vars (one assert per key so the message names the offender) ----
    - name: Assert image_tag is set
      ansible.builtin.assert:
        that: image_tag | default('') | length > 0
        fail_msg: |
          `image_tag` empty in vars/<env>.yml. Deploy phase uses it as the docker image tag.
          Fix: set `image_tag: <tag>` in vars/dev.yml, or pass `-e image_tag=<tag>` on the CLI.

    - name: Assert network is set
      ansible.builtin.assert:
        that: network | default('') | length > 0
        fail_msg: |
          `network` empty in vars/<env>.yml. Drives which Solana cluster the stack talks to (localnet/devnet/mainnet).
          Fix: set `network: localnet` (or devnet/mainnet) in vars/dev.yml.

    - name: Assert rpc_url is set
      ansible.builtin.assert:
        that: rpc_url | default('') | length > 0
        fail_msg: |
          `rpc_url` empty in vars/<env>.yml. Indexer + operator services connect to it for Solana RPC.
          Fix: set `rpc_url: http://127.0.0.1:18899` (localnet) or your devnet/mainnet RPC.

    - name: Assert host_data_dir is set
      ansible.builtin.assert:
        that: host_data_dir | default('') | length > 0
        fail_msg: |
          `host_data_dir` empty in vars/<env>.yml. Render writes compose.override.yml + .env there; data + logs live under it.
          Fix: set `host_data_dir: /opt/private-channel` (default) or `/tmp/private-channel-test` for self-tests.

    # ---- Required secrets (one assert per key) ----
    - name: Assert postgres_password is set
      ansible.builtin.assert:
        that: postgres_password | default('') | length > 0
        fail_msg: |
          `postgres_password` empty in secrets.yml. Sets the private_channel DB password on postgres-primary.
          Fix: edit private-channel-deploy/secrets.yml and add `postgres_password: <strong-password>`.

    - name: Assert postgres_replication_password is set
      ansible.builtin.assert:
        that: postgres_replication_password | default('') | length > 0
        fail_msg: |
          `postgres_replication_password` empty in secrets.yml. postgres-replica uses it for streaming replication.
          Fix: edit secrets.yml and add `postgres_replication_password: repl_password` (literal, until init-primary.sql is parameterised).

    # Only required when enforcement is on: env.j2 blanks JWT_SECRET when
    # gateway_enforce_jwt is false, so the secret's value is unused there.
    # Mirror the template's `default(true)` so an unset flag still requires it.
    - name: Assert jwt_secret is set
      ansible.builtin.assert:
        # `| trim` mirrors the gateway's configured_secret() trim semantics: a
        # whitespace-only jwt_secret disables gateway auth, so it must fail here too.
        that: jwt_secret | default('') | trim | length > 0
        fail_msg: |
          `jwt_secret` empty (or whitespace-only) in secrets.yml. Used by gateway to sign auth tokens.
          Fix: edit secrets.yml and add `jwt_secret: <random-32+-byte-string>`  (e.g. `openssl rand -hex 32`).
      when: gateway_enforce_jwt | default(true) | bool

    - name: Assert GHCR creds present
      ansible.builtin.assert:
        that:
        - ghcr_user | default('') | length > 0
        - ghcr_token | default('') | length > 0
        fail_msg: |
          `ghcr_user`/`ghcr_token` empty in secrets.yml. Deploy needs them to docker-login to GHCR before pulling images.
          Fix: edit secrets.yml — `ghcr_user: <github-username>`, `ghcr_token: <PAT with read:packages>`.

    # Yellowstone gRPC required for indexer-solana on public clusters
    # (localnet uses the bundled validator's Yellowstone, no external endpoint).
    - name: Assert yellowstone_endpoint set when network is not localnet
      ansible.builtin.assert:
        that: yellowstone_endpoint | default('') | length > 0
        fail_msg: |
          `yellowstone_endpoint` empty but network={{ network }}. indexer-solana streams events via Yellowstone gRPC; public Solana RPC doesn't include it.
          Fix: set `yellowstone_endpoint: <provider-url>` in vars/dev.yml. Providers: Helius (helius.dev), Triton (triton.one), QuickNode. No officially-free option for devnet/mainnet today.
      when: network != 'localnet'

    - name: Assert yellowstone_token set when network is not localnet
      ansible.builtin.assert:
        that: yellowstone_token | default('') | length > 0
        fail_msg: |
          `yellowstone_token` empty but network={{ network }}. All paid Yellowstone providers gate gRPC behind an auth token.
          Fix: edit secrets.yml and add `yellowstone_token: <provider-token>` (e.g. Helius `x-token`).
      when: network != 'localnet'

    # Compose file must be present on the control node — render copies it to
    # the target during PHASE 3, so this check is the source-of-truth gate.
    - name: Stat compose file on control node
      ansible.builtin.stat:
        path: "{{ repo_root }}/{{ compose_file }}"
      register: _compose_stat
      delegate_to: localhost
      run_once: true

    - name: Fail if compose file not found in repo
      ansible.builtin.assert:
        that: _compose_stat.stat.exists
        fail_msg: "Expected {{ repo_root }}/{{ compose_file }} not found on control node."

  # =========================================================================
  # PHASE 2: BOOTSTRAP — one-time host prep. Skipped via marker on subsequent runs.
  # =========================================================================
  - name: "==== PHASE 2: BOOTSTRAP ===="
    ansible.builtin.debug:
      msg: "One-time host setup (Docker check, dirs, GHCR auth). Skipped if marker exists."
    tags: [ always, bootstrap ]

  - name: Check bootstrap marker
    ansible.builtin.stat:
      path: "{{ bootstrap_marker }}"
    register: _bootstrap_marker
    tags: [ bootstrap ]

  - name: Bootstrap host
    when: not _bootstrap_marker.stat.exists
    tags: [ bootstrap ]
    block:
    # Docker is presumed installed on this dev machine; we verify only.
    # On a fresh VM this would `apt-get install docker.io docker-compose-plugin`.
    - name: Verify docker daemon reachable
      ansible.builtin.command: docker info
      changed_when: false

    # Layout: data/ for volumes mapped from compose, logs/ for container stdout
    # archives if needed, config/ holds the rendered compose + env.
    - name: Create host_data_dir tree
      ansible.builtin.file:
        path: "{{ host_data_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop: [ "", data, logs, config ]

    # GHCR creds → ~/.docker/config.json so `docker compose pull` can fetch images.
    # Forced to /bin/bash because `set -o pipefail` is bash-only and Debian/Ubuntu
    # ship dash as /bin/sh.
    - name: Write GHCR credentials to docker config
      ansible.builtin.shell: |
        set -euo pipefail
        mkdir -p ~/.docker
        echo -n '{{ ghcr_user }}:{{ ghcr_token }}' | base64 -w0 > /tmp/.ghcr_b64
        python3 -c "
        import json, os, pathlib
        p = pathlib.Path(os.path.expanduser('~/.docker/config.json'))
        cfg = json.loads(p.read_text()) if p.exists() else {}
        cfg.setdefault('auths', {})['ghcr.io'] = {'auth': open('/tmp/.ghcr_b64').read()}
        p.write_text(json.dumps(cfg, indent=2))
        "
        rm -f /tmp/.ghcr_b64
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    # Drop the marker last so a partial bootstrap re-runs cleanly.
    - name: Drop bootstrap marker
      ansible.builtin.copy:
        dest: "{{ bootstrap_marker }}"
        content: "bootstrapped {{ ansible_date_time.iso8601 }}\n"
        mode: "0644"

  # =========================================================================
  # PHASE 2.5: RESET_STATE — wipe data volumes in lockstep with the validator.
  #
  # WHY THIS EXISTS — DO NOT REMOVE WITHOUT UNDERSTANDING THIS:
  #
  # The validator container boots with `--reset` by default (VALIDATOR_RESET_FLAG
  # in templates/env.j2, gated by the `validator_reset` var — default true), so
  # every redeploy starts from genesis: empty ledger, zero ATA balances, no prior
  # signatures. (Set validator_reset=false only with persistence — see its note
  # in vars/common.yml.) Meanwhile the indexer's startup
  # reconciliation compares its Postgres totals (deposits/withdrawals per
  # mint) against on-chain ATA balances. Stale rows from a prior run describe
  # a chain that no longer exists, the on-chain balance comes back as 0, and
  # the indexer crashes immediately with `MismatchExceedsThreshold` — which is correct:
  # that *is* a desync. The fix is to wipe the indexer DB whenever we wipe
  # the validator ledger, so they stay in lockstep.
  #
  # Do NOT paper over this by raising INDEXER_RECONCILIATION_MISMATCH_THRESHOLD_RAW;
  # that hides real desync at runtime, which is a much worse failure mode.
  #
  # The block runs *before* PHASE 3 (RENDER) and PHASE 4 (DEPLOY) so that
  # `docker compose up -d --wait` brings everything up against a clean slate.
  # When `reset_state=false` (default for multi/prod) the entire block is a
  # no-op, so this is safe to leave on for envs that should never wipe.
  # =========================================================================
  - name: "==== PHASE 2.5: RESET_STATE ===="
    ansible.builtin.debug:
      msg: "reset_state={{ reset_state | default(false) }} — wiping volumes in lockstep with validator if true."
    tags: [ always, reset_state ]

  - name: Reset stack state (validator + indexer in lockstep)
    when: reset_state | default(false) | bool
    tags: [ reset_state ]
    vars:
      # Target-side paths so this works on remote hosts that don't have the repo.
      # PHASE 3 RENDER (next phase) is what populates these on first run; on
      # reset we tolerate either missing-file branch via the conditionals below.
      # `-p private-channel` pins the project name across phases; without it compose
      # derives it from the file's parent dir and reset misses the volumes.
      compose_cmd: >-
        docker compose -p private-channel --env-file {{ target_versions_env_file }} --env-file {{ target_config_dir }}/.env -f {{ target_compose_file }} -f {{ target_override_file }}
      mon_compose_cmd: >-
        docker compose --env-file {{ target_config_dir }}/.env -f {{ monitoring_dir }}/monitoring.compose.yml
    block:
    # Tear down monitoring first so its dependents (blackbox probes against
    # the private-channel network) drop cleanly before the private-channel stack network is
    # removed. Ignore failures: the very first run won't have a monitoring
    # compose rendered yet, and `down` on a missing project is a no-op we
    # don't care about.
    - name: Stop monitoring stack (with volumes)
      ansible.builtin.shell: |
        if [ -f "{{ monitoring_dir }}/monitoring.compose.yml" ]; then
          {{ mon_compose_cmd }} down -v --remove-orphans || true
        fi
      changed_when: true

    # Tear down the private-channel stack with -v so anonymous + named volumes go
    # away. We pass --remove-orphans because `compose_services` may have
    # changed between runs and stranded containers from the prior set
    # would otherwise survive.
    - name: Stop private-channel stack (with volumes)
      ansible.builtin.shell: |
        if [ -f "{{ host_data_dir }}/config/compose.override.yml" ]; then
          {{ compose_cmd }} down -v --remove-orphans || true
        fi
      changed_when: true

    # Belt-and-braces #1: the private-channel services hardcode `container_name:
    # private-channel-*`, so the daemon enforces global uniqueness on those names
    # across every compose project. If an earlier `docker compose` ran
    # without `-p private-channel` (e.g. directly from {{ host_data_dir }}/config,
    # which leaves project=config), the down above only sees `-p private-channel`
    # and leaves those orphan containers behind — and the next `up`
    # collides on the hardcoded names. Discover any project that owns a
    # private-channel-* container and tear it down with volumes + orphans, then
    # force-remove anything left as a final safety net.
    - name: Tear down any orphan compose projects owning private-channel-* containers
      ansible.builtin.shell: |
        set +e
        seen=""
        for cid in $(docker ps -aq --filter 'name=^private-channel-'); do
          p=$(docker inspect --format '{% raw %}{{ index .Config.Labels "com.docker.compose.project" }}{% endraw %}' "$cid" 2>/dev/null)
          if [ -n "$p" ] && [ "$p" != "private-channel" ] && ! echo "$seen" | tr ' ' '\n' | grep -qx "$p"; then
            echo "Cleaning orphan compose project: $p"
            docker compose -p "$p" down -v --remove-orphans 2>/dev/null || true
            seen="$seen $p"
          fi
        done
        ids=$(docker ps -aq --filter 'name=^private-channel-')
        if [ -n "$ids" ]; then docker rm -f $ids; fi
      changed_when: true

    # Belt-and-braces #2: even if a stale named volume is referenced by no
    # current compose project (e.g. user changed compose_file), nuke it
    # by name. `docker volume rm` returns 1 on missing volume; ignore.
    - name: Remove named volumes by exact name
      ansible.builtin.shell: |
        docker volume rm \
          private-channel_postgres-indexer-data \
          private-channel_postgres-indexer-wal-archive \
          private-channel_postgres-primary-data \
          private-channel_postgres-primary-wal-archive \
          private-channel_postgres-replica-data \
          private-channel_validator-data 2>/dev/null || true
      changed_when: true

    # Wipe per-host data + logs (mounted into containers) but preserve
    # config/ (the rendered compose+env from PHASE 3 of the *previous* run
    # — harmless to keep, will be re-rendered) and the marker files so the
    # one-time bootstrap doesn't repeat unnecessarily.
    - name: Wipe host data and logs (preserve config + markers)
      ansible.builtin.shell: |
        set -e
        if [ -d "{{ host_data_dir }}/data" ]; then
          find "{{ host_data_dir }}/data" -mindepth 1 -delete
        fi
        if [ -d "{{ host_data_dir }}/logs" ]; then
          find "{{ host_data_dir }}/logs" -mindepth 1 -delete
        fi
      changed_when: true

  # =========================================================================
  # PHASE 3: RENDER — turn vars + secrets into compose + env files on the host.
  # =========================================================================
  - name: "==== PHASE 3: RENDER ===="
    ansible.builtin.debug:
      msg: "Rendering compose override and .env into {{ host_data_dir }}/config."
    tags: [ always, render ]

  - name: Render templates
    tags: [ render ]
    block:
    # Ship the base compose file + versions.env to the target so pull/up/down
    # work against hosts that don't have the repo (registry mode against a
    # remote VM, etc.). Local builds still need the full repo on target.
    - name: Copy compose file to target
      ansible.builtin.copy:
        src: "{{ repo_root }}/{{ compose_file }}"
        dest: "{{ target_compose_file }}"
        mode: "0644"

    - name: Copy versions.env to target
      ansible.builtin.copy:
        src: "{{ repo_root }}/versions.env"
        dest: "{{ target_versions_env_file }}"
        mode: "0644"

    - name: Render compose override
      ansible.builtin.template:
        src: templates/compose.yml.j2
        dest: "{{ target_override_file }}"
        mode: "0644"

    # If a prior run wrote a real escrow instance ID into the .env file,
    # preserve it across re-renders. Otherwise the next deploy overwrites it
    # with the all-1s placeholder, which leaves the indexer's already-
    # populated DB pointing at a non-existent instance and reconciliation
    # crashes. With `reset_state=true` the DB has been wiped so this doesn't
    # matter; with `reset_state=false` it absolutely does. We read the
    # existing file (best-effort), grep out the COMMON_ESCROW_INSTANCE_ID
    # line, and pass it as a fact for env.j2.
    - name: Read existing .env (if any) to preserve previously-written instance ID
      ansible.builtin.shell: |
        if [ -f "{{ host_data_dir }}/config/.env" ]; then
          grep -m1 '^COMMON_ESCROW_INSTANCE_ID=' "{{ host_data_dir }}/config/.env" \
            | cut -d= -f2- || true
        fi
      register: _existing_instance_id
      changed_when: false
      no_log: true

    - name: Set escrow_instance_id_pda from existing .env if present and non-placeholder
      when:
      - _existing_instance_id.stdout | default('') | length > 0
      - _existing_instance_id.stdout | trim != '11111111111111111111111111111111'
      - escrow_instance_id_pda is not defined
      ansible.builtin.set_fact:
        escrow_instance_id_pda: "{{ _existing_instance_id.stdout | trim }}"

    - name: Render .env
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ host_data_dir }}/config/.env"
        mode: "0600"
      no_log: true

    # Fail closed if the rendered .env is missing required secrets, using the
    # same scripts/check-required-env.sh the Makefile's check-env-* targets run.
    # This gives deploy and local-dev one shared env-completeness guard so both
    # enforce the identical contract (e.g. a blank POSTGRES_PASSWORD from an
    # undecrypted SOPS var is caught here rather than at container start).
    - name: Validate required secrets in rendered .env
      ansible.builtin.script:
        cmd: >-
          {{ repo_root }}/scripts/check-required-env.sh {{ target_versions_env_file }} {{ target_config_dir }}/.env
      changed_when: false

    # The base compose file has bind mounts with relative `./` sources resolved
    # against the compose file's directory ({{ target_config_dir }}). When a
    # bind source doesn't exist on the host, Docker silently creates an empty
    # *directory* in its place — postgres then errors `01-init.sql: Is a
    # directory`, the validator can't read its programs, and the geyser plugin
    # can't load its config. Ship the actual files to the target so the bind
    # mounts resolve to real files.
    #
    # Stale-state cleanup: a previous failed run may have left those auto-
    # created directories behind. ansible.builtin.copy can't replace a dir
    # with a file, so wipe placeholder paths first.
    - name: Remove stale bind-mount placeholder dirs (if Docker auto-created)
      ansible.builtin.file:
        path: "{{ target_config_dir }}/{{ item }}"
        state: absent
      loop:
      - init-primary.sql
      - init-primary-hba.sh
      - yellowstone-config.json

    - name: Copy postgres init SQL to target
      ansible.builtin.copy:
        src: "{{ repo_root }}/init-primary.sql"
        dest: "{{ target_config_dir }}/init-primary.sql"
        mode: "0644"

    - name: Copy postgres init HBA script to target
      ansible.builtin.copy:
        src: "{{ repo_root }}/init-primary-hba.sh"
        dest: "{{ target_config_dir }}/init-primary-hba.sh"
        mode: "0755"

    - name: Copy indexer/operator TOML configs to target
      ansible.builtin.copy:
        src: "{{ repo_root }}/indexer/config/"
        dest: "{{ target_config_dir }}/indexer/config/"
        mode: "0644"
        directory_mode: "0755"

    # Devnet/mainnet indexer + operator TOMLs. docker-compose.devnet.yml
    # bind-mounts ./scripts/devnet/config:/config/devnet for all four
    # indexer/operator services; the localnet stack uses indexer/config/ above
    # instead. Without shipping this dir, Docker auto-creates an empty one at
    # the bind source and every service crashes looking for
    # /config/devnet/indexer-solana.toml. The rpc_url / yellowstone endpoint
    # inside these TOMLs are placeholders — they're overridden at runtime by the
    # COMMON_RPC_URL / INDEXER_YELLOWSTONE_ENDPOINT env vars the devnet compose
    # injects from the rendered .env (figment merges env over TOML).
    - name: Copy devnet/mainnet indexer/operator TOML configs to target
      ansible.builtin.copy:
        src: "{{ repo_root }}/scripts/devnet/config/"
        dest: "{{ target_config_dir }}/scripts/devnet/config/"
        mode: "0644"
        directory_mode: "0755"
      when: network != 'localnet'

    # Validator-only assets. The validator service is included in
    # compose_services on localnet only (see vars/common.yml), but the bind
    # mounts exist in the base compose unconditionally — copying these for
    # other networks would still create real files at unused paths, which is
    # harmless. Gating on localnet keeps the deploy faster and avoids
    # requiring the operator to have built .so files for non-validator runs.
    - name: Copy yellowstone geyser plugin config to target
      ansible.builtin.copy:
        src: "{{ repo_root }}/yellowstone-config.json"
        dest: "{{ target_config_dir }}/yellowstone-config.json"
        mode: "0644"
      when: network == 'localnet'

    - name: Stat validator BPF programs locally
      ansible.builtin.stat:
        path: "{{ repo_root }}/target/deploy/{{ item }}.so"
      register: _bpf_stat
      loop:
      - private_channel_escrow_program
      - private_channel_withdraw_program
      when: network == 'localnet'
      delegate_to: localhost
      run_once: true

    # Auto-build any missing .so on localnet. Underscore-to-dash maps the
    # artifact name onto its source dir: private_channel_escrow_program ->
    # private-channel-escrow-program/program. cargo-build-sbf incremental is ~30s,
    # cold ~2min — we surface a debug line so the user knows why preflight
    # paused. If cargo-build-sbf isn't on PATH, the next assert catches it
    # via a still-missing .so with a clear fix command.
    - name: Probe for cargo-build-sbf on control node
      ansible.builtin.command: cargo-build-sbf --version
      changed_when: false
      check_mode: false
      failed_when: false
      register: _sbf_tool
      delegate_to: localhost
      run_once: true
      when:
      - network == 'localnet'
      - _bpf_stat.results | default([]) | rejectattr('stat.exists') | list | length > 0

    - name: Fail with toolchain hint if cargo-build-sbf missing and a build is needed
      ansible.builtin.assert:
        that: _sbf_tool.rc == 0
        fail_msg: |
          BPF programs are missing under {{ repo_root }}/target/deploy/ and
          `cargo-build-sbf` isn't on PATH on the control node, so they can't
          be auto-built.

          Fix: install the Solana toolchain (see `make install-toolchain`),
          then re-run this playbook. Or pre-build manually with
          `make build-localnet`.
      delegate_to: localhost
      run_once: true
      when:
      - network == 'localnet'
      - _bpf_stat.results | default([]) | rejectattr('stat.exists') | list | length > 0

    - name: Notify about auto-build (incremental ~30s, cold ~2min per program)
      ansible.builtin.debug:
        msg: "Auto-building missing BPF programs: {{ _bpf_stat.results | rejectattr('stat.exists') | map(attribute='item') | list }}"
      when:
      - network == 'localnet'
      - _bpf_stat.results | default([]) | rejectattr('stat.exists') | list | length > 0
      delegate_to: localhost
      run_once: true

    - name: Auto-build missing BPF programs
      ansible.builtin.command:
        cmd: cargo-build-sbf
        chdir: "{{ repo_root }}/{{ item.item | replace('_', '-') }}/program"
      loop: "{{ _bpf_stat.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('') }}"
      when:
      - network == 'localnet'
      - not (item.stat.exists | default(false))
      delegate_to: localhost
      run_once: true

    - name: Re-stat BPF programs after auto-build
      ansible.builtin.stat:
        path: "{{ repo_root }}/target/deploy/{{ item }}.so"
      register: _bpf_stat
      loop:
      - private_channel_escrow_program
      - private_channel_withdraw_program
      when: network == 'localnet'
      delegate_to: localhost
      run_once: true

    - name: Assert all BPF programs present (catches build failures)
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: |
          BPF program still missing after auto-build attempt: {{ item.item }}.so.
          Build likely failed — re-run with -vvv, or build manually:
          (cd {{ repo_root }}/{{ item.item | replace('_', '-') }}/program && cargo-build-sbf)
      loop: "{{ _bpf_stat.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('') }}"
      when: network == 'localnet'
      delegate_to: localhost
      run_once: true

    # ansible.builtin.copy refuses to create missing parent dirs when the
    # source is a single file (only directory-source `src: foo/` mode does).
    # Earlier runs got away with this because Docker had already auto-
    # created /tmp/.../config/target/deploy/ as a bind-mount placeholder
    # from a prior failed `up`; once that was cleaned up the parent
    # disappeared and the copy started failing with "Destination directory
    # ... does not exist". Create it explicitly.
    - name: Ensure target/deploy/ parent dir exists on target
      ansible.builtin.file:
        path: "{{ target_config_dir }}/target/deploy"
        state: directory
        mode: "0755"
      when: network == 'localnet'

    - name: Copy validator BPF programs to target
      ansible.builtin.copy:
        src: "{{ repo_root }}/target/deploy/{{ item }}.so"
        dest: "{{ target_config_dir }}/target/deploy/{{ item }}.so"
        mode: "0644"
      loop:
      - private_channel_escrow_program
      - private_channel_withdraw_program
      when: network == 'localnet'

  # =========================================================================
  # PHASE 4: DEPLOY — pull pinned tag from GHCR, then bring stack up.
  # =========================================================================
  - name: "==== PHASE 4: DEPLOY ===="
    ansible.builtin.debug:
      msg: "image_tag={{ image_tag }}"
    tags: [ always, deploy ]

  - name: Deploy stack
    tags: [ deploy ]
    vars:
      # `-p private-channel` pins the project name (otherwise compose derives it from
      # the file's parent dir, which differs between invocations).
      # --env-file order: versions.env (image pins) then our rendered .env.
      # Override file is appended last so its `image:` keys win.
      compose_cmd: >-
        docker compose -p private-channel --env-file {{ target_versions_env_file }} --env-file {{ target_config_dir }}/.env -f {{ target_compose_file }} -f {{ target_override_file }}
    block:
    # Pull pinned tag. Runs from the target's config dir so the host doesn't
    # need the repo.
    - name: Pull images from registry
      ansible.builtin.shell: "{{ compose_cmd }} pull {{ compose_services }}"
      args:
        chdir: "{{ target_config_dir }}"
      changed_when: true

    # Postgres runs as uid 70, but Docker creates named volumes root-owned, so the
    # archive_command (`cp %p /wal_archive/...`) fails with "Permission denied" and
    # WAL piles up unrecycled (archive_mode=on) until the disk fills. Chown the
    # archive volumes to 70:70 before postgres starts; the one-off `docker run` also
    # creates the volume if absent (e.g. after a reset_state wipe). Mirrors the
    # WAL-permission fix in bench-tps/scripts/run.sh.
    - name: Fix WAL-archive volume ownership for postgres (uid 70)
      ansible.builtin.command:
        cmd: >-
          docker run --rm -v private-channel_{{ item }}:/vol alpine
          chown -R 70:70 /vol
      loop:
        - postgres-primary-wal-archive
        - postgres-indexer-wal-archive
      changed_when: true

    # `up -d --wait` blocks until each service's healthcheck passes (or fails).
    # That's the bulk of the deploy-time gating; the explicit health phase
    # below is the second layer (HTTP probes from the control node).
    - name: Bring stack up
      ansible.builtin.shell: "{{ compose_cmd }} up -d --wait {{ compose_services }}"
      args:
        chdir: "{{ target_config_dir }}"
      changed_when: true
      register: _up_out

    - name: Record deployed tag
      ansible.builtin.copy:
        dest: "{{ deployed_tag_file }}"
        content: "{{ image_tag }} {{ ansible_date_time.iso8601 }}\n"
        mode: "0644"

  # =========================================================================
  # PHASE 5: HEALTH — out-of-process HTTP probes per service.
  # =========================================================================
  - name: "==== PHASE 5: HEALTH ===="
    ansible.builtin.debug:
      msg: "Probing /health on each enabled service."
    tags: [ always, health ]

  - name: Probe service /health endpoints
    tags: [ health ]
    vars:
      # Map of service -> port. Filtered below to whatever compose_services covers.
      _health_probes:
        gateway: "{{ gateway_port }}"
        write-node: "{{ write_port }}"
        read-node: "{{ read_port }}"
      # When compose_services is "" (all), probe everything; otherwise probe the subset.
      _enabled: >-
        {{ _health_probes.keys() | list if (compose_services | trim) == ''
           else _health_probes.keys() | list | select('in', compose_services.split()) | list }}
    block:
    - name: HTTP probe
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _health_probes[item] }}/health"
        status_code: [ 200 ]
        timeout: 5
      register: _probe
      until: _probe.status == 200
      retries: "{{ health_retries }}"
      delay: "{{ health_delay }}"
      loop: "{{ _enabled }}"
      loop_control:
        label: "{{ item }}:{{ _health_probes[item] }}"

    # Postgres health via pg_isready inside the container — works for any
    # postgres-* service in the stack without needing psql on the host.
    - name: pg_isready inside primary
      when: "'postgres-primary' in compose_services or compose_services | trim == ''"
      ansible.builtin.command: docker exec private-channel-postgres-primary pg_isready -U {{ postgres_user }}
      changed_when: false
      register: _pgr
      until: _pgr.rc == 0
      retries: "{{ health_retries }}"
      delay: "{{ health_delay }}"

  # =========================================================================
  # PHASE 6: MONITORING — Prometheus + Grafana + exporters as a sibling
  # stack in its own compose file. Lives in the same network namespace as
  # the Solana Private Channels stack so blackbox can probe the service hostnames and
  # cAdvisor sees all containers. Default-on; skip with --skip-tags monitoring.
  # Runs before sanity so Prometheus is queryable for metric-based checks.
  # =========================================================================
  - name: "==== PHASE 6: MONITORING ===="
    ansible.builtin.debug:
      msg: "Bringing up Prometheus/Grafana/blackbox/cAdvisor/node_exporter."
    tags: [ always, monitoring ]

  - name: Render and bring up monitoring stack
    tags: [ monitoring ]
    vars:
      mon_compose_cmd: >-
        docker compose --env-file {{ host_data_dir }}/config/.env -f {{ monitoring_dir }}/monitoring.compose.yml
    block:
    # Monitoring sources live at {{ repo_root }}/monitoring/ (one canonical
    # tree, shared with `make docker-up` via Dockerfile.grafana). Mirror that
    # tree under {{ monitoring_dir }} on the target so the rendered compose
    # can bind-mount provisioning/ and dashboards/ at the same paths Grafana
    # expects.
    - name: Create monitoring dir tree
      ansible.builtin.file:
        path: "{{ monitoring_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
      - ""
      - prometheus
      - blackbox
      - grafana/provisioning/datasources
      - grafana/provisioning/dashboards
      - grafana/provisioning/alerting
      - grafana/dashboards

    - name: Render monitoring compose
      ansible.builtin.template:
        src: "{{ repo_root }}/monitoring/monitoring.compose.yml.j2"
        dest: "{{ monitoring_dir }}/monitoring.compose.yml"
        mode: "0644"

    - name: Render prometheus.yml
      ansible.builtin.template:
        src: "{{ repo_root }}/monitoring/prometheus.yml.j2"
        dest: "{{ monitoring_dir }}/prometheus/prometheus.yml"
        mode: "0644"

    - name: Copy blackbox.yml
      ansible.builtin.copy:
        src: "{{ repo_root }}/monitoring/blackbox.yml"
        dest: "{{ monitoring_dir }}/blackbox/blackbox.yml"
        mode: "0644"

    # Whole-tree copies replace what used to be per-file render tasks. This
    # is the merge point: the same provisioning/ + dashboards/ trees ship
    # to both Dockerfile.grafana (baked in) and here (bind-mounted).
    - name: Copy Grafana provisioning tree (datasources, dashboards provider, alerting)
      ansible.builtin.copy:
        src: "{{ repo_root }}/monitoring/provisioning/"
        dest: "{{ monitoring_dir }}/grafana/provisioning/"
        mode: "0644"
        directory_mode: "0755"

    - name: Copy bundled dashboard JSONs
      ansible.builtin.copy:
        src: "{{ repo_root }}/monitoring/dashboards/"
        dest: "{{ monitoring_dir }}/grafana/dashboards/"
        mode: "0644"
        directory_mode: "0755"

    - name: Bring up monitoring stack
      ansible.builtin.shell: "{{ mon_compose_cmd }} up -d --wait"
      changed_when: true
      register: _mon_up

    - name: Verify Prometheus is ready
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ monitoring_prometheus_port }}/-/ready"
        status_code: [ 200 ]
      register: _prom_ready
      until: _prom_ready.status == 200
      retries: 30
      delay: 2

    # Pick up scrape-config edits without losing in-memory scrape state.
    # Requires --web.enable-lifecycle on the prometheus service (set in
    # monitoring.compose.yml.j2). 200 = config reloaded, 204 = same config
    # (no-op, harmless), 403 = lifecycle endpoint not enabled (older
    # template — the up -d --wait above already restarted the container in
    # that case, so config is fresh anyway).
    - name: Reload Prometheus config (picks up scrape-job changes)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ monitoring_prometheus_port }}/-/reload"
        method: POST
        status_code: [ 200, 204, 403 ]
      register: _prom_reload
      changed_when: _prom_reload.status in [200, 204]

    - name: Verify Grafana is healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/health"
        status_code: [ 200 ]
      register: _graf_health
      until: _graf_health.status == 200
      retries: 30
      delay: 2

    # Confirm blackbox is reporting at least one successful probe — proves
    # both the scrape config and the target list are wired correctly.
    # Pass the PromQL query as a URL parameter — passing it as a body on
    # a GET is non-standard and the version of Prometheus we ship rejects
    # it as an empty `query` parameter.
    - name: Verify blackbox is producing successful probes
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ monitoring_prometheus_port }}/api/v1/query?query=probe_success%20%3D%3D%201"
        method: GET
        status_code: [ 200 ]
        return_content: true
      register: _bb_query
      until: (_bb_query.json.data.result | default([]) | length) > 0
      retries: 30
      delay: 2

    - name: Verify a Grafana dashboard provisioned
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/search?type=dash-db"
        user: admin
        password: "{{ grafana_admin_password }}"
        force_basic_auth: true
        status_code: [ 200 ]
        return_content: true
      register: _graf_search
      until: (_graf_search.json | default([]) | length) > 0
      retries: 15
      delay: 2

    - name: Monitoring URLs
      ansible.builtin.debug:
        msg:
        - "Grafana    : http://127.0.0.1:{{ monitoring_grafana_port }} (admin / <grafana_admin_password>)"
        - "Prometheus : http://127.0.0.1:{{ monitoring_prometheus_port }}"
        - "blackbox   : http://127.0.0.1:{{ monitoring_blackbox_port }}"
        - "cAdvisor   : http://127.0.0.1:{{ monitoring_cadvisor_port }}"
        - "Dashboards : {{ (_graf_search.json | default([])) | map(attribute='title') | list }}"

  # =========================================================================
  # PHASE 7: SANITY — passive verification after the stack + monitoring are up.
  # No new transactions are sent; the script inspects /health endpoints,
  # Prometheus metrics, and recent logs. Each check prints
  # `==== CHECK N: <name> ====` with PASS / FAIL / SKIP and a short reason.
  #
  # Active end-to-end testing (real deposit → indexer → withdraw → burn) is
  # invoked manually post-deploy; see private-channel-deploy/SMOKE_TEST.md.
  # =========================================================================
  - name: "==== PHASE 7: SANITY ===="
    ansible.builtin.debug:
      msg: "Running passive sanity checks (healthchecks, metrics, recent logs)."
    tags: [ always, sanity ]

  - name: Run sanity script
    tags: [ sanity ]
    ansible.builtin.script:
      cmd: "{{ playbook_dir }}/scripts/sanity.sh"
    environment:
      GATEWAY_URL: "http://127.0.0.1:{{ gateway_port }}"
      WRITE_URL: "http://127.0.0.1:{{ write_port }}"
      READ_URL: "http://127.0.0.1:{{ read_port }}"
      POSTGRES_USER: "{{ postgres_user }}"
      PROMETHEUS_URL: "http://127.0.0.1:{{ monitoring_prometheus_port }}"
    register: _sanity
    changed_when: false
    failed_when: _sanity.rc != 0

  - name: Sanity summary
    tags: [ sanity ]
    ansible.builtin.debug:
      var: _sanity.stdout_lines

  # =========================================================================
  # PHASE 8: REPORT — final summary, optional webhook.
  # =========================================================================
  - name: "==== PHASE 8: REPORT ===="
    ansible.builtin.debug:
      msg: "Final summary."
    tags: [ always, report ]

  # Refresh ansible_date_time so elapsed reflects real wall time (gather_facts
  # caches it once at play start).
  - name: Refresh facts for elapsed time
    tags: [ report ]
    ansible.builtin.setup:
      gather_subset: [ "!all", "!min", "date_time" ]

  - name: Build report
    tags: [ report ]
    ansible.builtin.set_fact:
      _report: |
        ============================================================
        Solana Private Channels deploy report
        ------------------------------------------------------------
        host           : {{ inventory_hostname }} ({{ ansible_host | default('local') }})
        env (group)    : {{ group_names | difference(['all']) | first | default('?') }}
        image_tag      : {{ image_tag }}
        network        : {{ network }}
        rpc_url        : {{ rpc_url }}
        host_data_dir  : {{ host_data_dir }}
        reset_state    : {{ reset_state | default(false) }}
        services       : {{ compose_services if (compose_services | trim) else '(all)' }}
        started_at     : {{ deploy_start_ts }}
        elapsed        : {{ (ansible_date_time.epoch | int) - (deploy_start_epoch | int) }}s
        ============================================================

  - name: Print report
    tags: [ report ]
    ansible.builtin.debug:
      msg: "{{ _report.split('\n') }}"

  - name: POST report to notify_webhook
    tags: [ report ]
    when: notify_webhook | default('') | length > 0
    ansible.builtin.uri:
      url: "{{ notify_webhook }}"
      method: POST
      body_format: json
      body:
        text: "{{ _report }}"
      status_code: [ 200, 201, 202, 204 ]
    failed_when: false
