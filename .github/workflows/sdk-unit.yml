name: TypeScript SDK Unit Tests

concurrency:
  group: sdk-unit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
  push:
    branches: [main, hardening/pre-release-audit]
    paths:
      - "private-channel-escrow-program/clients/typescript/**"
      - "private-channel-withdraw-program/clients/typescript/**"
      - ".github/workflows/sdk-unit.yml"
      - "private-channel-escrow-program/idl/**"
      - "private-channel-escrow-program/scripts/**"
      - "private-channel-escrow-program/package.json"
      - "private-channel-withdraw-program/idl/**"
      - "private-channel-withdraw-program/scripts/**"
      - "private-channel-withdraw-program/package.json"

  pull_request:
    branches: [main, hardening/pre-release-audit]
    paths:
      - "private-channel-escrow-program/clients/typescript/**"
      - "private-channel-withdraw-program/clients/typescript/**"
      - ".github/workflows/sdk-unit.yml"
      - "private-channel-escrow-program/idl/**"
      - "private-channel-escrow-program/scripts/**"
      - "private-channel-escrow-program/package.json"
      - "private-channel-withdraw-program/idl/**"
      - "private-channel-withdraw-program/scripts/**"
      - "private-channel-withdraw-program/package.json"

jobs:
  typescript-sdk-unit:
    name: TypeScript SDK Unit Tests
    runs-on: private-channel-runner-1
    strategy:
      matrix:
        program: [private-channel-escrow-program, private-channel-withdraw-program]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.15.1

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        shell: bash
        run: cd ${{ matrix.program }} && pnpm install --frozen-lockfile

      - name: Generate clients
        run: cd ${{ matrix.program }} && pnpm run generate-clients

      - name: Check code formatting
        run: cd ${{ matrix.program }} && pnpm run format:check

      - name: Build TypeScript SDK
        run: cd ${{ matrix.program }} && pnpm run build

      - name: Run TypeScript unit tests with coverage
        run: |
          cd ${{ matrix.program }} && pnpm run test:unit --coverage --coverageDirectory=coverage-unit

      - name: Display coverage summary
        working-directory: ${{ matrix.program }}/clients/typescript
        run: |
          if [ -f coverage-unit/coverage-summary.json ]; then
            cat coverage-unit/coverage-summary.json | jq '.total'
          fi

      - name: Prepare coverage for upload
        run: |
          cp ${{ matrix.program }}/clients/typescript/coverage-unit/lcov.info ./coverage-ts.lcov 2>/dev/null || true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: ts-unit-coverage-${{ matrix.program }}
          path: coverage-ts.lcov
          if-no-files-found: warn
          retention-days: 30

      - name: Show failure logs
        if: failure()
        uses: ./.github/actions/show-failure-logs
        with:
          test-type: "TypeScript unit (${{ matrix.program }})"
