name: Program Integration Tests

on:
  push:
    branches: [main, hardening/pre-release-audit]
    paths:
      - "private-channel-escrow-program/**"
      - "private-channel-withdraw-program/**"
      - "Cargo.*"
      - "Makefile"
      - ".github/workflows/program-integration.yml"
      - "scripts/**"
  pull_request:
    branches: [main, hardening/pre-release-audit]
    paths:
      - "private-channel-escrow-program/**"
      - "private-channel-withdraw-program/**"
      - "Cargo.*"
      - "Makefile"
      - ".github/workflows/program-integration.yml"
      - "scripts/**"
env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

permissions:
  contents: read

jobs:
  integration-test:
    name: Program Integration Tests
    runs-on: private-channel-runner-1
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          install-base-cargo-tools: "false"
          install-system-dependencies: "false"
          build-programs: "false"

      - name: Build programs
        run: |
          make -C private-channel-escrow-program build
          make -C private-channel-withdraw-program build

      - name: Run escrow integration tests
        run: make -C private-channel-escrow-program integration-test-no-build

      - name: Run withdraw integration tests
        run: make -C private-channel-withdraw-program integration-test-no-build

      - name: Show failure logs
        if: failure()
        uses: ./.github/actions/show-failure-logs
        with:
          test-type: "Program integration"
