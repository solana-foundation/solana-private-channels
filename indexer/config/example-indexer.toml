# Example configuration for Solana Private Channels Indexer
# Copy this file and customize for your deployment
# Secrets (DATABASE_URL, tokens) should be set via environment variables

[common]
# Program type: "escrow" or "withdraw"
program_type = "escrow"

# RPC endpoint URL
rpc_url = "http://localhost:8899"

# Escrow instance ID (required for escrow program type, omit for withdraw)
# escrow_instance_id = "YourPubkeyHere..."

[storage]
# Storage type: "postgres"
type = "postgres"

# Maximum number of database connections
max_connections = 10

# Database URL must be set via environment variable: DATABASE_URL
# The indexer DB is loopback/internal-only and listens on port 5434.
# Example: export DATABASE_URL="postgresql://user:pass@localhost:5434/indexer"

[indexer]
# Datasource type: "rpc_polling" or "yellowstone"
datasource_type = "rpc_polling"

# === RPC Polling Configuration ===
[indexer.rpc_polling]
# Starting slot (optional, omit to start from latest)
# start_slot = 0

# Polling interval in milliseconds
poll_interval_ms = 1000

# Error retry interval in milliseconds
error_retry_interval_ms = 5000

# Batch size for processing blocks
batch_size = 50

# === Yellowstone gRPC Configuration ===
[indexer.yellowstone]
# Yellowstone gRPC endpoint URL
# endpoint = "grpc://your-yellowstone-endpoint:10000"

# Commitment level: "processed", "confirmed", or "finalized".
# Keep "finalized" for escrow ingestion: deposits become irreversible
# private-channel mints, so a "confirmed" deposit lost to a Solana reorg would
# produce an unbacked mint with no rollback path.
commitment = "finalized"

# Token must be set via environment variable: INDEXER_YELLOWSTONE_TOKEN
# Example: export INDEXER_YELLOWSTONE_TOKEN="your-token"

# === Backfill Configuration ===
[indexer.backfill]
# Enable automatic backfill on startup
enabled = false

# Enable backfill only mode (exits after backfill completes)
backfill_only = false

# Batch size for backfill operations
batch_size = 5

# Max gap in slots before requiring manual intervention (~45 days at 400ms slots)
max_gap_slots = 10000000

# RPC URL for backfill (optional, defaults to common.rpc_url)
# rpc_url = "http://localhost:8899"

# === Startup Reconciliation Configuration ===
# Runs automatically on startup when program_type = "escrow".
# Skipped automatically for "withdraw".
[indexer.reconciliation]
# Maximum absolute mismatch allowed (in raw token units, not UI decimals).
#
# 0 (default) = strict: any mismatch blocks startup.
# > 0 = tolerance: mismatches up to this value log a warning and continue;
#        mismatches above this value log an error with reconciliation_alert=true
#        and abort startup.
#
# Note on false positives: there is a small race window between the DB balance
# query and the on-chain RPC fetch. A deposit that arrives on-chain in that
# window will appear in the ATA balance but not yet in the DB, producing a
# transient mismatch even when the indexer state is otherwise correct.
# If you observe spurious startup failures caused by this, set this to a small
# value (e.g. the raw amount of one or two minimum deposits for this mint).
mismatch_threshold_raw = 0
