# Local docker-compose configuration for Solana indexer (Yellowstone)

[common]
program_type = "escrow"
rpc_url = "http://localhost:18899"

# Placeholder — overridden at runtime by COMMON_ESCROW_INSTANCE_ID, which
# bench-tps/scripts/run.sh derives from the persistent deposit-instance-seed.json
# keypair and injects via .env before starting Docker services.
# Only used as a fallback for manual `docker compose up` without run.sh;
# update this value to match your actual escrow instance PDA in that case.
escrow_instance_id = "7HgtQ4VcSZJDtzUBQbjqMWcSr5dauigbqRFqpQMK8pwz"

[storage]
type = "postgres"
max_connections = 10

[indexer]
datasource_type = "yellowstone"

[indexer.yellowstone]
endpoint = "http://localhost:10000"
# Must stay "finalized": deposits become irreversible private-channel mints, so
# ingesting at "confirmed" would let a Solana reorg produce an unbacked mint.
commitment = "finalized"

[indexer.rpc_polling]
poll_interval_ms = 1000
error_retry_interval_ms = 5000
batch_size = 50

[indexer.backfill]
enabled = true
backfill_only = false
batch_size = 100
max_gap_slots = 10000000
# start_slot = 100  # Optional: First slot to process (inclusive, e.g., 100 means start from slot 100)
