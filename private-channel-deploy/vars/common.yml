# Shared defaults for every env. Per-env files override individual keys.
# Edit only when something is genuinely cross-env (a port the team agrees on,
# a new healthcheck timeout). Env-specific values belong in vars/<env>.yml.

# --- Layout on the host ---
# All deploy artifacts (compose.yml, .env, data dirs) live under host_data_dir.
# Override per-env if /opt isn't writable on the target.
host_data_dir: /opt/private-channel
# Marker file recording one-time bootstrap; bootstrap phase is skipped while present.
bootstrap_marker: "{{ host_data_dir }}/.bootstrapped"
# File holding the currently-deployed image tag, written at end of deploy phase.
deployed_tag_file: "{{ host_data_dir }}/.deployed-tag"

# --- Image source ---
# `image_registry` and `image_tag` are per-environment config and live in
# vars/<env>.yml (see vars/dev.yml). Common.yml provides no defaults so a
# missing var fails fast instead of silently falling back.

# --- Repo location ---
# Path on the control node containing docker-compose.yml + the files PHASE 3
# RENDER ships to the target (init scripts, indexer config, etc.).
repo_root: "{{ playbook_dir }}/.."

# --- Compose stack selection ---
# Path to the compose file relative to repo_root. Selected automatically by `network`:
#   localnet         -> docker-compose.yml          (bundled validator)
#   devnet / mainnet -> docker-compose.devnet.yml   (talks to external Solana RPC)
# Override per-env if you ship a custom compose file.
compose_file: "{{ 'docker-compose.devnet.yml' if network | default('localnet') in ['devnet', 'mainnet'] else 'docker-compose.yml' }}"
# Compose services to bring up. The base list runs on every cluster; `validator`
# is appended only on localnet (devnet/mainnet use real Solana RPC, no local
# validator container). Override compose_services per-env if you need a custom
# subset.
compose_services_base: "postgres-primary postgres-replica write-node read-node gateway postgres-indexer indexer-solana indexer-private-channel operator-solana operator-private-channel"
compose_services: "{{ compose_services_base }}{{ ' validator' if network | default('localnet') == 'localnet' else '' }}"

# --- Ports (host-side) — read by health probes ---
gateway_port: 8899
write_port: 8900
read_port: 8901
streamer_port: 8902
auth_port: 8903

# --- Health phase tuning ---
# Per-service probe budget. With backoff inside the retry loop this gives
# ~30s of hysteresis per service before the phase fails.
health_retries: 15
health_delay: 2

# --- Postgres defaults (passwords come from secrets.yml) ---
postgres_db: private_channel
postgres_user: private_channel
postgres_indexer_db: indexer
postgres_replication_user: replicator

# --- Reset-state default ---
# Each per-env file overrides this. Default to `false` so that any new env
# someone adds without thinking about it is non-destructive — they have to
# opt in explicitly. See vars/dev.yml for the rationale.
reset_state: false

# --- Validator ledger reset ---
# Controls VALIDATOR_RESET_FLAG in the rendered .env (localnet bundled validator).
# Default `true`: boot with `--reset` from genesis on every redeploy, which the
# indexer's startup reconciliation depends on (see the RESET_STATE rationale in
# deploy.yml). Set `false` to preserve the validator ledger across redeploys —
# the deploy analogue of `make docker-up-persist`. Only safe when Postgres is
# NOT wiped in lockstep, or the indexer will reconcile stale rows against an
# empty chain.
validator_reset: true

# --- Optional notification webhook posted from the report phase ---
notify_webhook: ""

# --- Grafana alerting contact point (vendor-neutral by default) ------------
# Grafana's provisioned contact point reads these via env substitution. Leave
# at the defaults for a no-op (alerting evaluates but notifies nowhere). To
# enable, set both, e.g. in your env vars or secrets:
#   alert_contact_type: slack            # any Grafana receiver type
#   alert_webhook_url: <slack incoming webhook URL>   # treat as a secret
alert_contact_type: "webhook"
alert_webhook_url: "http://localhost:9/no-op"

# --- Build-arg pins, mirrored from versions.env so renders stay reproducible ---
# Shipped to the target during PHASE 3 RENDER and passed to compose via --env-file.
versions_env_file: "{{ repo_root }}/versions.env"

# --- Target-side paths -----------------------------------------------------
# PHASE 3 RENDER copies the compose file + versions.env from the control node
# into target_config_dir on every target. Pull/up/down then reference these
# target-side paths so the playbook works against a remote host that doesn't
# have the repo. Local builds still use the repo paths above.
target_config_dir: "{{ host_data_dir }}/config"
target_compose_file: "{{ target_config_dir }}/{{ compose_file }}"
target_versions_env_file: "{{ target_config_dir }}/versions.env"
target_override_file: "{{ target_config_dir }}/compose.override.yml"
