global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # cAdvisor metrics for all containers
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Keep only metrics for specific containers
      - source_labels: [container_label_com_docker_compose_service]
        regex: '(write-node|read-node|gateway|streamer|postgres-primary|postgres-replica|postgres-indexer|validator|indexer-solana|indexer-private_channel|operator-solana|operator-private_channel)'
        action: keep

  # Indexer & Operator app-level metrics
  - job_name: 'indexer-solana'
    scrape_interval: 2s
    static_configs:
      - targets: ['indexer-solana${HOST_SUFFIX}:9100']

  - job_name: 'indexer-private_channel'
    scrape_interval: 2s
    static_configs:
      - targets: ['indexer-private_channel${HOST_SUFFIX}:9100']

  - job_name: 'operator-solana'
    scrape_interval: 2s
    static_configs:
      - targets: ['operator-solana${HOST_SUFFIX}:9102']

  - job_name: 'operator-private_channel'
    scrape_interval: 2s
    static_configs:
      - targets: ['operator-private_channel${HOST_SUFFIX}:9103']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway${HOST_SUFFIX}:9101']

  - job_name: 'bench-tps'
    scrape_interval: 1s
    static_configs:
      - targets: ['${BENCH_METRICS_TARGET}']

  - job_name: 'write-node-stages'
    scrape_interval: 2s
    static_configs:
      - targets: ['write-node:${PRIVATE_CHANNEL_METRICS_PORT}']

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://write-node${HOST_SUFFIX}:8900/health
          - http://read-node${HOST_SUFFIX}:8901/health
          - http://streamer${HOST_SUFFIX}:8902/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter${HOST_SUFFIX}:9115

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
